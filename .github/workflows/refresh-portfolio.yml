name: Refresh portfolio content
on:
  workflow_dispatch:
  schedule:
    - cron: '17 4 * * *'
  push:
    branches: [master]
    paths:
      - '.github/workflows/refresh-portfolio.yml'
permissions:
  contents: write
  models: read
jobs:
  refresh:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: portfolio-site
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: portfolio-site/package-lock.json
      - run: npm ci
      - run: npm run refresh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MODELS_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GOOGLE_PROFILE_FILE_ID: ${{ vars.GOOGLE_PROFILE_FILE_ID }}
          GOOGLE_RESUME_FILE_ID: ${{ vars.GOOGLE_RESUME_FILE_ID }}
      - run: npm test
      - run: npm run build
      - name: Commit refreshed content
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/data
          git diff --cached --quiet || git commit -m "chore: refresh portfolio content"
          git push
